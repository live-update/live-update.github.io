<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crew Dashboard | Broadcast Director</title>
  <style>
:root {
    --bg: #ffffff;
    --surface: #f4f6f8;
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #0056b3;
    --danger: #dc3545;
    --success: #28a745;
    --border: #e0e0e0;
    --warning: #ff9800;
    --offline: #9e9e9e;
  }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-container {
      width: 100%;
      max-width: 950px;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 15px;
      transition: opacity 0.3s ease;
    }

    /* Locked Dashboard State */
    .app-locked {
      pointer-events: none;
      opacity: 0.55;
      user-select: none;
      filter: grayscale(40%);
    }

    .panel {
      background: var(--bg);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }

    .panel-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      border-bottom: 2px solid var(--surface);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #systemStatusText {
      transition: color 0.3s ease;
      text-transform: capitalize;
    }

    /* Dynamic Connection Badge in Top Left */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: bold;
      color: var(--offline);
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--offline);
      transition: background-color 0.3s;
    }
    .is-blinking {
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: capitalize;
    }

    .mini-score {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      background: var(--surface);
      padding: 10px 15px;
      border-radius: 8px;
    }
    .status-box {
      font-size: 14px;
      color: var(--text);
      font-weight: bold;
      text-align: left;
      margin-bottom: 15px;
      text-transform: capitalize;
    }

    .this-over {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 5px;
    }
    .ball {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    .ball.w {
      background: var(--danger);
      color: white;
    }
    .ball.four {
      background: var(--accent);
      color: white;
    }
    .ball.six {
      background: var(--danger);
      color: white;
    }

    /* UNIFIED STATS GRID - 4 Columns on Desktop, 2 on Mobile */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    .stat-card {
      background: var(--surface);
      padding: 10px;
      border-radius: 8px;
    }
    .stat-val {
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .info-label {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .info-val {
      font-weight: bold;
      font-size: 14px;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      .app-container {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <div class="app-container app-locked" id="main-app">

    <div class="panel">
      <div class="panel-title">
        <span id="systemStatusText">CONNECTING...</span>
        <div class="live-badge" id="topBadge">
          <div class="dot" id="topBadgeDot"></div>
          <span id="topBadgeText">WAIT</span>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px">
        <div style="font-size: 20px; font-weight: 900; color: var(--accent);">
          <span id="batTeam"></span> 🏏
        </div>
        <div style="font-size: 16px; color: var(--text-muted);">
          vs <span style="font-size: 16px; font-weight: bold; color: var(--text);" id="bowlTeam"></span>
        </div>
      </div>

      <div class="mini-score">
        <div style="font-size: 46px; font-weight: 900; line-height: 1; color: var(--danger);">
          <span id="displayScore">0</span><span style="color: var(--text-muted); font-size: 30px;">/<span style="color: var(--text); font-size: 30px;" id="displayWickets">0</span></span>
        </div>
        <div style="font-size: 16px; color: var(--text-muted); font-weight: bold; text-align: right;">
          Overs<br>
          <span id="displayOvers" style="color: var(--text); font-size: 26px;">0.0</span> <span style="font-size: 16px;">/ <span id="maxOvers">20</span></span>
        </div>
      </div>
      <div class="status-box" id="matchStatusText">
        1st Innings
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <label>Current RR</label>
          <div class="stat-val" id="crr">
            0.00
          </div>
        </div>
        <div class="stat-card" id="projBox">
          <label>Projected Score</label>
          <div class="stat-val" id="proj" style="color: var(--accent);">
            0
          </div>
        </div>
        <div class="stat-card" id="reqBox" style="display: none;">
          <label>Runs Needed</label>
          <div class="stat-val" id="need" style="color: var(--accent);">
            0
          </div>
        </div>
        <div class="stat-card" id="rrrBox" style="display: none;">
          <label>Required RR</label>
          <div class="stat-val" id="rrr" style="color: var(--danger);">
            0.00
          </div>
        </div>
        <div class="stat-card">
          <label>Match Target</label>
          <div class="stat-val" id="target">
            -
          </div>
        </div>
        <div class="stat-card">
          <label>Total Balls</label>
          <div class="stat-val" id="totalBallsRaw">
            0
          </div>
        </div>
        <div class="stat-card">
          <label>Balls Remaining</label>
          <div class="stat-val" id="ballsRemaining">
            0
          </div>
        </div>
      </div>

      <div class="stat-card">
        <label>This over</label>
        <div class="this-over" id="timeline">
          <div style="color: var(--text-muted); font-size: 13px;">
            Waiting for data...
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span>Broadcast Status</span>
        <div id="systemClock" style="font-size: 14px; font-weight: bold;">
          00:00:00
        </div>
      </div>

      <label>On Live</label>
      <div style="background: #fff5f5; border-left: 6px solid var(--danger); padding: 10px; border-radius: 6px; margin-bottom: 25px; font-size: 14px; font-weight: 900; color: var(--danger);" id="activeSceneText">
        1. Live Score
      </div>

      <label>Broadcast Data</label>
      <div class="stat-card">
        <div class="info-row">
          <span class="info-label">Event/Brand</span>
          <span class="info-val" id="brandText">None</span>
        </div>
        <div class="info-row">
          <span class="info-label">Timer Status</span>
          <span class="info-val" id="timerInfo">Inactive</span>
        </div>
        <div class="info-row" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
          <span class="info-label">Winner Locked</span>
          <span class="info-val" id="winnerInfo">No</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      goOnline,
      goOffline
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBmXewXcQQt97EJzbKceLbCoTTG_9aJlJI",
      authDomain: "bhaskarjyoticlub.firebaseapp.com",
      databaseURL: "https://bhaskarjyoticlub-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bhaskarjyoticlub",
      storageBucket: "bhaskarjyoticlub.firebasestorage.app",
      messagingSenderId: "730168687443",
      appId: "1:730168687443:web:479bedc258bd9dd06fffa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchRef = ref(db, 'broadcast_state');
    const connectedRef = ref(db, ".info/connected");

    // System Clock
    setInterval(() => {
      document.getElementById('systemClock').innerText = new Date().toLocaleTimeString('en-IN', {
        hour12: true
      });
    }, 1000);

    // --- CONNECTION HANDLING ---
    let isConnected = false;

    function updateBadge(text, color, blink) {
      const badge = document.getElementById('topBadge');
      const dot = document.getElementById('topBadgeDot');
      const textEl = document.getElementById('topBadgeText');

      badge.style.color = color;
      dot.style.backgroundColor = color;
      textEl.innerText = text;

      if (blink) badge.classList.add('is-blinking');
      else badge.classList.remove('is-blinking');
    }

    function evaluateConnection() {
      const appContainer = document.getElementById('main-app');
      const sysStatus = document.getElementById('systemStatusText');

      if (!navigator.onLine) {
        appContainer.classList.add('app-locked');
        updateBadge("OFFLINE", "var(--offline)", false);
        sysStatus.innerText = "No internet";
        sysStatus.style.color = "var(--danger)";
      } else if (!isConnected) {
        appContainer.classList.add('app-locked');
        updateBadge("NO DB", "var(--warning)", false);
        sysStatus.innerText = "No server";
        sysStatus.style.color = "var(--warning)";
      } else {
        appContainer.classList.remove('app-locked');
        updateBadge("LIVE", "var(--danger)", true);
        sysStatus.innerText = "Dashboard";
        sysStatus.style.color = "var(--text)";
      }
    }

    // Force Reconnect Logic
    window.addEventListener('online', () => {
      goOnline(db); evaluateConnection();
    });
    window.addEventListener('offline', () => {
      goOffline(db); evaluateConnection();
    });
    onValue(connectedRef, (snap) => {
      isConnected = snap.val() === true; evaluateConnection();
    });

    // --- MAIN DATA HANDLING ---
    onValue(matchRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      // Score Basics
      document.getElementById('batTeam').innerText = data.batTeam || "IND";
      document.getElementById('bowlTeam').innerText = data.bowlTeam || "AUS";
      document.getElementById('displayScore').innerText = data.runs || 0;
      document.getElementById('displayWickets').innerText = data.wickets || 0;
      document.getElementById('maxOvers').innerText = data.maxOvers || 20;
      document.getElementById('matchStatusText').innerText = data.statusBar || "";
      document.getElementById('brandText').innerText = data.brandTitle || "None";
      document.getElementById('winnerInfo').innerText = data.winText ? "Yes": "No";

      // Overs & Balls
      const totalBalls = data.totalBalls || 0;
      const maxBalls = (data.maxOvers || 20) * 6;
      document.getElementById('displayOvers').innerText = Math.floor(totalBalls / 6) + "." + (totalBalls % 6);
      document.getElementById('totalBallsRaw').innerText = totalBalls;
      document.getElementById('ballsRemaining').innerText = maxBalls - totalBalls;

      // Run Rates & Target Logic
      const oversDec = totalBalls / 6;
      const crr = totalBalls > 0 ? ((data.runs || 0) / oversDec).toFixed(2): "0.00";
      document.getElementById('crr').innerText = crr;

      const projBox = document.getElementById('projBox');
      const reqBox = document.getElementById('reqBox');
      const rrrBox = document.getElementById('rrrBox');

      if (data.innings === 2) {
        projBox.style.display = "none";
        reqBox.style.display = "block";
        rrrBox.style.display = "block";

        document.getElementById('target').innerText = data.target || 0;
        const ballsLeft = maxBalls - totalBalls;
        const runsNeeded = (data.target || 0) - (data.runs || 0);

        document.getElementById('need').innerText = runsNeeded > 0 ? runsNeeded: 0;
        document.getElementById('rrr').innerText = ballsLeft > 0 ? (runsNeeded / (ballsLeft / 6)).toFixed(2): "0.00";
      } else {
        projBox.style.display = "block";
        reqBox.style.display = "none";
        rrrBox.style.display = "none";

        document.getElementById('target').innerText = "-";
        document.getElementById('proj').innerText = Math.round(crr * (data.maxOvers || 20));
      }

      // Timeline (This Over)
      const timelineDiv = document.getElementById('timeline');
      if (data.thisOver && data.thisOver.length > 0) {
        timelineDiv.innerHTML = data.thisOver.map(ball => {
          let className = "ball";
          if (ball === 'W') className += " w";
          if (ball === '4') className += " four";
          if (ball === '6') className += " six";
          return `<div class="${className}">${ball}</div>`;
        }).join('');
      } else {
        timelineDiv.innerHTML = `<div style="color: var(--text-muted); font-size: 13px;">Start of over...</div>`;
      }

      // Broadcast / Director Info
      const sceneMap = {
        'live': '1. Live Score',
        'timer': '2. Timer',
        'decision': '3. Third Umpire',
        'winner': '4. Result',
        'custom': '5. Custom Graphics'
      };

      const activeScene = data.activeScene || 'live';
      const sceneTextEl = document.getElementById('activeSceneText');
      sceneTextEl.innerText = sceneMap[activeScene];

      if (activeScene === 'live') {
        sceneTextEl.style.color = 'var(--danger)'; sceneTextEl.style.borderLeftColor = 'var(--danger)';
      } else if (activeScene === 'custom') {
        sceneTextEl.style.color = 'var(--accent)'; sceneTextEl.style.borderLeftColor = 'var(--accent)';
      } else {
        sceneTextEl.style.color = 'var(--warning)'; sceneTextEl.style.borderLeftColor = 'var(--warning)';
      }

      // Timer Info
      if (data.timerTarget && new Date(data.timerTarget).getTime() > new Date().getTime()) {
        document.getElementById('timerInfo').innerText = "Active (" + data.timerMessage + ")";
      } else {
        document.getElementById('timerInfo').innerText = "Inactive";
      }
    });

    evaluateConnection();
  </script>
</body>
</html>
