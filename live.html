<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro OBS Overlay</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: transparent;
      font-family: 'Arial Black', sans-serif;
      color: #111;
    }

    /* Top Right System Bar */
    .global-bar {
      position: absolute;
      top: 30px;
      right: 40px;
      display: flex;
      gap: 20px;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.95);
      color: #222;
      padding: 8px 20px;
      border-radius: 30px;
      border: 1px solid #ccc;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #dc3545;
      text-transform: capitalize;
      letter-spacing: 2px;
      transition: color 0.3s;
    }
    .live-dot {
      width: 10px;
      height: 10px;
      background: #dc3545;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      transition: background 0.3s;
    }
    .clock {
      color: #333;
      border-left: 1px solid #ccc;
      padding-left: 20px;
    }
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.5);
        opacity: 0.5;
      }
    }

    /* Top Left Branding System */
    .top-left-brand {
      position: absolute;
      top: 30px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 15px;
      background:;
      padding:;
      border-radius:;
      box-shadow:;
      border:;
      z-index: 1000;
    }
    .brand-logo {
      max-width: 60px;
      max-height: 60px;
      object-fit: contain;
      border-radius: 6px;
    }
    .brand-texts {
      display: flex;
      flex-direction: column;
    }
    .brand-title {
      font-family: 'Arial Black', sans-serif;
      font-size: 22px;
      color: #0056b3;
      margin: 0;
      padding: 0;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .brand-sub {
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: bold;
      color: #555;
      margin: 0;
      padding: 0;
      text-transform: uppercase;
    }

    .scene {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      pointer-events: none;
    }
    .scene.active {
      opacity: 1;
    }

    /* SCENE 1: Live Scoreboard - Floating Wide Layout */
    .live-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #ccc;
      width: 90vw;
      max-width: 1600px;
      background: #fff;
      z-index: 100;
    }
    .scoreboard {
      display: flex;
      align-items: stretch;
      background: linear-gradient(to right, #ffffff, #f4f4f4);
    }
    .team {
      background: #0056b3;
      color: white;
      padding: 15px 40px;
      font-size: 36px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 15vw;
      min-width: 200px;
      justify-content: center;
    }
    .bat-icon {
      font-size: 28px;
      filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3));
    }
    .score-area {
      flex-grow: 1;
      display: flex;
      align-items: baseline;
      justify-content: center;
      padding: 10px 30px;
      background: #ffffff;
      color: #000;
      border-right: 1px solid #eee;
    }
    .runs-wickets {
      font-size: 55px;
    }
    .overs-text {
      font-size: 26px;
      color: #666;
      margin-left: 20px;
    }
    .vs-team {
      padding: 15px 40px;
      font-size: 26px;
      color: #444;
      background: #e9ecef;
      display: flex;
      align-items: center;
      width: 15vw;
      min-width: 200px;
      justify-content: center;
    }

    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #222;
      padding: 12px 30px;
      font-size: 28px;
      font-family: 'Segoe UI', sans-serif;
      font-weight: bold;
      border-top: 1px solid #ddd;
    }
    .stat-item {
      margin-right: 50px;
      color: #555;
    }
    .stat-val {
      color: #000;
      font-size: 28px;
    }
    #rrr {
      color: #dc3545 !important;
    }
    .timeline {
      display: flex;
      gap: 8px;
      margin-left: auto;
      align-items: center;
      padding-left: 30px;
    }
    .timeline .ball {
      width: 34px;
      height: 34px;
      background: #e0e0e0;
      color: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-family: Arial;
      font-weight: bold;
    }

    /* Match Status Bar */
    .status-bar {
      background: #ffc107;
      color: #000;
      padding: 10px 20px;
      font-size: 20px;
      font-family: 'Segoe UI', sans-serif;
      font-weight: bold;
      text-transform: capitalize;
      text-align: center;
      letter-spacing: 2px;
    }

    /* SCENE 2: Timer */
    .timer-scene {
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .timer-title {
      font-size: 50px;
      color: #0056b3;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .countdown {
      font-size: 140px;
      color: #111;
      font-variant-numeric: tabular-nums;
    }

    /* SCENE 3: DECISION PENDING */
    .decision-scene {
      background: radial-gradient(circle, #dc3545, #8b0000);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: heartbeat 2s infinite;
    }
    .decision-text {
      font-size: 100px;
      color: white;
      text-transform: uppercase;
      letter-spacing: 8px;
      text-shadow: 0 0 30px rgba(0,0,0,0.5);
      padding: 20px 50px;
    }
    .decision-sub {
      font-size: 36px;
      color: #ffeb3b;
      margin-top: 20px;
      letter-spacing: 5px;
    }

    /* SCENE 4: WINNER */
    .winner-scene {
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(255,255,255,0.95);
    }
    .winner-content {
      text-align: center;
      animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      padding: 60px 100px;
      border-radius: 20px;
      border: 4px solid #ffc107;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .trophy {
      font-size: 120px;
      margin-bottom: 10px;
    }
    .winner-text {
      font-size: 80px;
      color: #0056b3;
      text-transform: uppercase;
      margin-bottom: 15px;
    }
    .winner-sub {
      font-size: 36px;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
      font-weight: bold;
    }

    /* SCENE 5: CUSTOM GRAPHIC (FULL SCREEN ADVERTISING) */
    .custom-scene {
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      text-align: center;
      padding-bottom: 150px;
    }
    .custom-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
    }
    .custom-title {
      font-size: 90px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
      z-index: 2;
      position: relative;
      text-shadow: 0 5px 20px rgba(0,0,0,0.9), 0 2px 5px rgba(0,0,0,1);
    }
    .custom-text {
      font-size: 45px;
      color: #ffc107;
      font-family: 'Segoe UI', sans-serif;
      font-weight: bold;
      max-width: 80%;
      line-height: 1.4;
      z-index: 2;
      position: relative;
      text-shadow: 0 5px 20px rgba(0,0,0,0.9), 0 2px 5px rgba(0,0,0,1);
    }

    /* VISUAL EFFECTS */
    .effect-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .effect-text {
      font-size: 180px;
      font-weight: 900;
      text-transform: uppercase;
      transform: scale(0.5);
      text-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .effect-layer.show {
      opacity: 1;
    }
    .effect-layer.show .effect-text {
      animation: blast 2s cubic-bezier(0.1, 2, 0.5, 1) forwards;
    }
    .fx-four {
      color: #0056b3;
      -webkit-text-stroke: 4px #fff;
    }
    .fx-six {
      color: #dc3545;
      -webkit-text-stroke: 4px #fff;
    }
    .fx-out {
      color: #ff0000;
      font-size: 220px;
      -webkit-text-stroke: 5px #fff;
    }
    @keyframes popIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
    @keyframes blast {
      0% {
        transform: scale(0.1) rotate(-10deg);
        opacity: 0;
        filter: blur(10px);
      }

      20% {
        transform: scale(1.2) rotate(5deg);
        opacity: 1;
        filter: blur(0px);
      }

      80% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Top Right Clock & Connection Box -->
  <div class="global-bar">
    <div class="live-indicator" id="liveIndicator">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveText">LIVE</span>
    </div>
    <div class="clock" id="systemClock">
      00:00:00
    </div>
  </div>

  <!-- Top Left Branding Box -->
  <div class="top-left-brand" id="brandingBox" style="display: none;">
    <img id="brandLogoImg" src="" class="brand-logo" style="display: none;">
    <div class="brand-texts">
      <h1 class="brand-title" id="brandTitleText"></h1>
      <h2 class="brand-sub" id="brandSubText"></h2>
    </div>
  </div>

  <div class="scene active" id="scene-live">
    <div class="live-container">
      <div class="scoreboard">
        <div class="team">
          <span id="batTeam">IND</span> <span class="bat-icon">🏏</span>
        </div>
        <div class="score-area">
          <div class="runs-wickets">
            <span id="score">0</span>-<span id="wickets">0</span>
          </div>
          <div class="overs-text">
            Overs <span id="overs">0.0</span>
          </div>
        </div>
        <div class="vs-team">
          <span style="color:#888; font-size: 16px; margin-right:8px;">vs</span> <span id="bowlTeam" style="color: #111; font-weight:bold;">AUS</span>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat-item">
          CRR: <span class="stat-val" id="crr"></span>
        </div>
        <div class="stat-item" id="projGroup">
          PROJ: <span class="stat-val" id="proj"></span>
        </div>
        <div style="display:none; align-items:center;" id="targetGroup">
          <span class="stat-item">TARGET: <span class="stat-val" id="target">0</span></span>
          <span class="stat-item">RRR: <span class="stat-val" id="rrr">0.00</span></span>
          <span class="stat-item" style="margin-right: 0;">NEED: <span class="stat-val" id="need">0</span></span>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>
      <div class="status-bar" id="statusBarDisplay">
        Welcome to the match!
      </div>
    </div>
  </div>

  <div class="scene timer-scene" id="scene-timer">
    <div class="timer-title" id="timerTitle">
      MATCH STARTS IN
    </div>
    <div class="countdown" id="countdownTimer">
      00:00:00
    </div>
  </div>

  <div class="scene decision-scene" id="scene-decision">
    <div class="decision-text">
      THIRD UMPIRE
    </div>
    <div class="decision-sub">
      REVIEW IN PROGRESS...
    </div>
  </div>

  <div class="scene winner-scene" id="scene-winner">
    <div class="winner-content">
      <div class="trophy">
        🏆
      </div>
      <div class="winner-text" id="winnerText">
        TEAM WINS!
      </div>
      <div class="winner-sub" id="winSubText">
        by 0 runs
      </div>
    </div>
  </div>

  <!-- Full Screen Ad & Graphic Scene -->
  <div class="scene custom-scene" id="scene-custom">
    <img id="customGraphicImgDisplay" src="" class="custom-img" style="display:none;">
    <div class="custom-title" id="customTitleText"></div>
    <div class="custom-text" id="customSubText"></div>
  </div>

  <div class="effect-layer" id="effectLayer">
    <div class="effect-text" id="effectText"></div>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      goOnline,
      goOffline
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBmXewXcQQt97EJzbKceLbCoTTG_9aJlJI",
      authDomain: "bhaskarjyoticlub.firebaseapp.com",
      databaseURL: "https://bhaskarjyoticlub-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bhaskarjyoticlub",
      storageBucket: "bhaskarjyoticlub.firebasestorage.app",
      messagingSenderId: "730168687443",
      appId: "1:730168687443:web:479bedc258bd9dd06fffa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchRef = ref(db, 'broadcast_state');
    const connectedRef = ref(db, ".info/connected");

    // System Clock
    setInterval(() => {
      document.getElementById('systemClock').innerText = new Date().toLocaleTimeString('en-IN', {
        hour12: true
      });
    }, 1000);

    // --- CONNECTION HANDLING ---
    let isConnected = false;

    function evaluateConnection() {
      const indicator = document.getElementById('liveIndicator');
      const dot = document.getElementById('liveDot');
      const text = document.getElementById('liveText');

      if (!navigator.onLine) {
        indicator.style.color = '#9e9e9e';
        dot.style.background = '#9e9e9e';
        dot.style.animation = 'none';
        text.innerText = 'OFFLINE';
      } else if (!isConnected) {
        indicator.style.color = '#ff9800';
        dot.style.background = '#ff9800';
        dot.style.animation = 'none';
        text.innerText = 'Connecting';
      } else {
        indicator.style.color = '#dc3545';
        dot.style.background = '#dc3545';
        dot.style.animation = 'pulse 1.5s infinite';
        text.innerText = 'LIVE';
      }
    }

    // Force Reconnect Logic
    window.addEventListener('online', () => {
      goOnline(db); evaluateConnection();
    });
    window.addEventListener('offline', () => {
      goOffline(db); evaluateConnection();
    });
    onValue(connectedRef, (snap) => {
      isConnected = snap.val() === true; evaluateConnection();
    });

    // --- MAIN DATA HANDLING ---
    let lastEffectTime = 0;
    let timerInterval = null;

    onValue(matchRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      // Scenes
      document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
      const activeSceneEl = document.getElementById('scene-' + (data.activeScene || 'live'));
      if (activeSceneEl) activeSceneEl.classList.add('active');

      // Branding (Top Left)
      const hasBranding = data.brandTitle || data.brandSub || data.brandLogo;
      document.getElementById('brandingBox').style.display = hasBranding ? 'flex': 'none';

      const logoEl = document.getElementById('brandLogoImg');
      if (data.brandLogo) {
        logoEl.src = data.brandLogo; logoEl.style.display = 'block';
      } else {
        logoEl.style.display = 'none';
      }

      document.getElementById('brandTitleText').innerText = data.brandTitle || "";
      document.getElementById('brandSubText').innerText = data.brandSub || "";

      // Custom Graphic Scene (Scene 5)
      const customImgEl = document.getElementById('customGraphicImgDisplay');
      if (data.customImg) {
        customImgEl.src = data.customImg; customImgEl.style.display = 'block';
      } else {
        customImgEl.style.display = 'none';
      }

      const titleTextEl = document.getElementById('customTitleText');
      titleTextEl.innerText = data.customTitle || "";
      titleTextEl.style.display = data.customTitle ? 'block': 'none';

      const subTextEl = document.getElementById('customSubText');
      subTextEl.innerText = data.customText || "";
      subTextEl.style.display = data.customText ? 'block': 'none';

      // Pre-Match Timer Logic
      document.getElementById('timerTitle').innerText = data.timerMessage || "MATCH STARTS IN";
      clearInterval(timerInterval);
      if (data.timerTarget) {
        timerInterval = setInterval(() => {
          const diff = new Date(data.timerTarget).getTime() - new Date().getTime();
          if (diff < 0) {
            document.getElementById('countdownTimer').innerText = "00:00:00";
          } else {
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdownTimer').innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
          }
        },
          1000);
      } else {
        document.getElementById('countdownTimer').innerText = "00:00:00";
      }

      // Winner Data
      document.getElementById('winnerText').innerText = data.winText || "VICTORY!";
      document.getElementById('winSubText').innerText = data.winSubText || "";

      // Status Bar
      document.getElementById('statusBarDisplay').innerText = data.statusBar || "";

      // Score Data
      document.getElementById('batTeam').innerText = data.batTeam || "IND";
      document.getElementById('score').innerText = data.runs || 0;
      document.getElementById('wickets').innerText = data.wickets || 0;
      document.getElementById('overs').innerText = Math.floor((data.totalBalls || 0) / 6) + "." + ((data.totalBalls || 0) % 6);
      document.getElementById('bowlTeam').innerText = data.bowlTeam || "AUS";

      const oversDec = (data.totalBalls || 0) / 6;
      const crr = data.totalBalls > 0 ? ((data.runs || 0) / oversDec).toFixed(2): "0.00";
      document.getElementById('crr').innerText = crr;

      const targetGroup = document.getElementById('targetGroup');
      const projGroup = document.getElementById('projGroup');

      if (data.innings === 2) {
        projGroup.style.display = "none"; targetGroup.style.display = "flex";
        document.getElementById('target').innerText = data.target || 0;
        const ballsLeft = ((data.maxOvers || 20) * 6) - (data.totalBalls || 0);
        const runsNeeded = (data.target || 0) - (data.runs || 0);
        document.getElementById('need').innerText = runsNeeded > 0 ? runsNeeded: 0;
        document.getElementById('rrr').innerText = ballsLeft > 0 ? (runsNeeded / (ballsLeft / 6)).toFixed(2): "0.00";
      } else {
        targetGroup.style.display = "none"; projGroup.style.display = "flex";
        document.getElementById('proj').innerText = Math.round(crr * (data.maxOvers || 20));
      }

      const timelineDiv = document.getElementById('timeline');
      if (data.thisOver && data.thisOver.length > 0) {
        timelineDiv.innerHTML = data.thisOver.map(ball => {
          let bg = "#e0e0e0", color = "#000";
          if (ball === 'W') {
            bg = "#dc3545"; color = "#fff";
          }
          if (ball === '4') {
            bg = "#0056b3"; color = "#fff";
          }
          if (ball === '6') {
            bg = "#dc3545"; color = "#fff";
          }
          return `<div class="ball" style="background:${bg}; color:${color}">${ball}</div>`;
        }).join('');
      } else {
        timelineDiv.innerHTML = "";
      }

      // Action Effects
      if (data.effectTimestamp > lastEffectTime) {
        lastEffectTime = data.effectTimestamp;
        if (Date.now() - data.effectTimestamp < 4000) {
          const fxLayer = document.getElementById('effectLayer');
          const fxText = document.getElementById('effectText');

          fxText.className = 'effect-text';
          if (data.effectType === 'FOUR') {
            fxText.innerText = "FOUR!"; fxText.classList.add('fx-four');
          } else if (data.effectType === 'SIX') {
            fxText.innerText = "SIX!"; fxText.classList.add('fx-six');
          } else if (data.effectType === 'OUT') {
            fxText.innerText = "OUT!"; fxText.classList.add('fx-out');
          }

          fxLayer.classList.remove('show');
          void fxLayer.offsetWidth;
          fxLayer.classList.add('show');
          setTimeout(() => fxLayer.classList.remove('show'), 3000);
        }
      }
    });

    evaluateConnection();
  </script>
</body>
</html>
