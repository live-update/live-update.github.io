<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Broadcast Director</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #666;
      --accent: #0056b3;
      --danger: #dc3545;
      --success: #28a745;
      --border: #e0e0e0;
      --warning: #ff9800;
      --offline: #9e9e9e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* System Status Alert Banner */
    #system-alert-banner {
      width: 100%;
      max-width: 950px;
      margin-bottom: 20px;
      padding: 15px 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: bold;
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .alert-hidden { display: none !important; }
    .alert-offline { background-color: #ffebee; color: #c62828; border: 1px solid #ef5350; }
    .alert-nodb { background-color: #fff3e0; color: #ef6c00; border: 1px solid #ff9800; }
    .alert-syncing { background-color: #fffde7; color: #f57f17; border: 1px solid #fff59d; }

    .app-container {
      width: 100%;
      max-width: 950px;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 20px;
      transition: opacity 0.3s ease;
    }

    /* Locked Dashboard State */
    .app-locked {
      pointer-events: none; /* Physically prevents all clicking and typing */
      opacity: 0.55; /* Fades the UI to show it's disabled */
      user-select: none;
    }

    .panel {
      background: var(--surface);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    .panel-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--bg);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      color: var(--accent);
    }
    
    /* Dynamic Connection Badge */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: bold;
      color: var(--offline);
      transition: color 0.3s;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--offline);
      transition: background-color 0.3s;
    }
    .is-blinking {
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-sizing: border-box;
      background: var(--bg);
      font-family: inherit;
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }
    button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 15px 0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:hover { background: var(--bg); }
    .btn-4 { background: #e3f2fd; color: #0d47a1; border-color: #bbdefb; }
    .btn-6 { background: #ffebee; color: #b71c1c; border-color: #ffcdd2; }
    .btn-out { background: var(--danger); color: white; border-color: var(--danger); }

    .scene-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    .scene-btn { font-size: 12px; padding: 10px; }
    .scene-btn.active { border-color: var(--accent); color: var(--accent); background: #f0f7ff; }

    .mini-score {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
      background: var(--bg);
      padding: 10px;
      border-radius: 8px;
    }
    .status-box {
      font-size: 12px;
      color: var(--accent);
      font-weight: bold;
      text-align: center;
      margin-bottom: 15px;
    }
    .this-over {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin-top: 10px;
      font-size: 12px;
    }
    .ball {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .effect-row { display: flex; gap: 10px; }
    .btn-fx { background: #343a40; color: white; font-size: 12px; flex: 1; padding: 10px; }
    .btn-action { background: #1a1a1a; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-success { background: var(--success); color: white; }

    .input-group { display: flex; gap: 10px; }
    .input-group > div { flex: 1; }

    @media (max-width: 768px) {
      .app-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="system-alert-banner" class="alert-syncing">
    <span id="alert-icon" style="font-size: 20px;">⏳</span>
    <span id="alert-message">SYSTEM LOCKED: Syncing data... Please wait.</span>
  </div>

  <div class="app-container app-locked" id="main-app">
    <div class="panel">
      <div class="panel-title">
        <span id="systemStatusText">CONNECTING...</span>
        <div class="live-badge" id="topBadge">
          <div class="dot" id="topBadgeDot"></div>
          <span id="topBadgeText">CONNECTING</span>
        </div>
      </div>

      <div class="input-group">
        <div>
          <label>Batting 🏏</label>
          <input type="text" id="batTeam" placeholder="Batting" value="IND">
        </div>
        <div>
          <label>Bowling ⚾</label>
          <input type="text" id="bowlTeam" placeholder="Bowling" value="AUS">
        </div>
        <div style="flex: 0.5;">
          <label>Overs</label>
          <input type="number" id="maxOvers" value="20">
        </div>
      </div>

      <div class="mini-score">
        <span id="displayScore">0</span>/<span id="displayWickets">0</span> (<span id="displayOvers">0.0</span>)
        <div class="this-over" id="thisOverUI"></div>
      </div>
      <div class="status-box" id="matchStatusText">
        1st Innings
      </div>

      <div class="keypad">
        <button onclick="addRun(0, '0')">0</button>
        <button onclick="addRun(1, '1')">1</button>
        <button onclick="addRun(2, '2')">2</button>
        <button onclick="addRun(3, '3')">3</button>
        <button class="btn-4" onclick="addRun(4, '4')">4</button>
        <button class="btn-6" onclick="addRun(6, '6')">6</button>
        <button onclick="addExtra('WD', 1)">WD</button>
        <button onclick="addExtra('NB', 1)">NB</button>
        <button onclick="addExtra('BYE', 0)">BYE</button>
        <button onclick="addExtra('LB', 0)">LB</button>
        <button class="btn-out" onclick="addWicket()">OUT</button>
        <button onclick="undo()">⟲ Undo</button>
      </div>

      <div style="display: flex; gap: 10px;">
        <button style="flex: 1; background: var(--text); color: white;" onclick="switchInnings()">🔄 Switch Innings</button>
        <button style="flex: 0.5;" onclick="resetMatch()">Reset</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">
        BROADCAST DIRECTOR
      </div>

      <label>Active Scene Switcher</label>
      <div class="scene-grid">
        <button class="scene-btn active" id="btn-scene-live" onclick="setScene('live')">1. Live Score</button>
        <button class="scene-btn" id="btn-scene-timer" onclick="setScene('timer')">2. Pre-Match</button>
        <button class="scene-btn" id="btn-scene-decision" onclick="setScene('decision')">3. Umpire</button>
        <button class="scene-btn" id="btn-scene-winner" onclick="setScene('winner')">4. Result</button>
        <button class="scene-btn" id="btn-scene-custom" onclick="setScene('custom')" style="grid-column: span 2; border-color: #673ab7; color: #512da8;">5. Custom Image Graphic</button>
      </div>

      <label>Match Status Bar (Bottom of Live Score)</label>
      <input type="text" id="statusBar" placeholder="e.g., IND won the toss and chose to bat">

      <div style="margin-top:15px; border-top: 1px solid #eee; padding-top: 15px;">
        <label>Top-Left Branding (Overlay Always Visible)</label>
        <div class="input-group">
          <input type="text" id="brandTitle" placeholder="Heading (e.g., T20 CUP)">
          <input type="text" id="brandSub" placeholder="Sub-text (e.g., Match 12)">
        </div>
        <input type="text" id="brandLogo" placeholder="Logo Image URL (Optional)">
      </div>

      <div style="margin-top:15px; border-top: 1px solid #eee; padding-top: 15px;">
        <label>Custom Screen Graphic (Scene 5 Data)</label>
        <input type="text" id="customImg" placeholder="Image URL (e.g., Sponsor/Player Banner)">
        <input type="text" id="customTitle" placeholder="Main Heading (e.g., PLAYER OF THE MATCH)">
        <input type="text" id="customText" placeholder="Sub-text or Stats description">
      </div>

      <div style="margin-top:15px; border-top: 1px solid #eee; padding-top: 15px;">
        <label>Pre-Match Timer Settings (Scene 2)</label>
        <input type="text" id="timerMessage" placeholder="Custom Text (e.g., MATCH STARTS IN)" value="MATCH STARTS IN">
        <input type="datetime-local" id="timerTarget">
      </div>

      <button class="btn-action btn-success" onclick="declareResult()">🏆 Auto-Calculate Winner & Show Result</button>

      <div style="margin-top:15px; border-top: 1px solid #eee; padding-top: 15px;">
        <label>Manual Screen Effects (On Live Feed)</label>
        <div class="effect-row">
          <button class="btn-fx" onclick="triggerEffect('FOUR')">Fire "FOUR"</button>
          <button class="btn-fx" onclick="triggerEffect('SIX')">Fire "SIX"</button>
          <button class="btn-fx" style="background: var(--danger);" onclick="triggerEffect('OUT')">Fire "OUT"</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    // ADDED goOnline and goOffline for forceful reconnection
    import { getDatabase, ref, set, get, onValue, goOnline, goOffline } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBmXewXcQQt97EJzbKceLbCoTTG_9aJlJI",
      authDomain: "bhaskarjyoticlub.firebaseapp.com",
      databaseURL: "https://bhaskarjyoticlub-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bhaskarjyoticlub",
      storageBucket: "bhaskarjyoticlub.firebasestorage.app",
      messagingSenderId: "730168687443",
      appId: "1:730168687443:web:479bedc258bd9dd06fffa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchRef = ref(db, 'broadcast_state');
    const connectedRef = ref(db, ".info/connected");

    let state = { batTeam: "IND", bowlTeam: "AUS", runs: 0, wickets: 0, totalBalls: 0, maxOvers: 20, innings: 1, target: 0, thisOver: [], legalBallsThisOver: 0, activeScene: "live", statusBar: "Match starting soon...", winText: "", winSubText: "", effectType: "", effectTimestamp: 0, timerMessage: "MATCH STARTS IN", timerTarget: "", brandTitle: "", brandSub: "", brandLogo: "", customTitle: "", customText: "", customImg: "" };
    let history = [];

    // STRICT SYSTEM LOCKS
    let isConnected = false;
    let isDataLoaded = false;

    function updateBadge(text, color, blink) {
      const badge = document.getElementById('topBadge');
      const dot = document.getElementById('topBadgeDot');
      const textEl = document.getElementById('topBadgeText');
      
      badge.style.color = color;
      dot.style.backgroundColor = color;
      textEl.innerText = text;
      
      if(blink) badge.classList.add('is-blinking');
      else badge.classList.remove('is-blinking');
    }

    function evaluateSystemLock() {
      const banner = document.getElementById('system-alert-banner');
      const alertIcon = document.getElementById('alert-icon');
      const alertMessage = document.getElementById('alert-message');
      const appContainer = document.getElementById('main-app');
      const sysStatusText = document.getElementById('systemStatusText'); // Top-left corner text

      if (!navigator.onLine) {
        // 1. NO INTERNET
        banner.className = 'alert-offline';
        alertIcon.innerText = "🚨";
        alertMessage.innerText = "SYSTEM LOCKED: No Internet Connection. Check Wi-Fi or Mobile Data.";
        appContainer.classList.add('app-locked');
        updateBadge("OFFLINE", "var(--offline)", false);
        sysStatusText.innerText = "NETWORK DISCONNECTED";
        sysStatusText.style.color = "var(--danger)";
      } 
      else if (!isConnected) {
        // 2. NO DATABASE
        banner.className = 'alert-nodb';
        alertIcon.innerText = "⚠️";
        alertMessage.innerText = "SYSTEM LOCKED: Server Disconnected. Reconnecting to Firebase...";
        appContainer.classList.add('app-locked');
        updateBadge("NO DB", "var(--warning)", false);
        sysStatusText.innerText = "SERVER RECONNECTING...";
        sysStatusText.style.color = "var(--warning)";
      } 
      else if (!isDataLoaded) {
        // 3. SYNCING DATA
        banner.className = 'alert-syncing';
        alertIcon.innerText = "⏳";
        alertMessage.innerText = "SYSTEM LOCKED: Syncing data from live server. Please wait...";
        appContainer.classList.add('app-locked');
        updateBadge("SYNCING", "#fbc02d", true);
        sysStatusText.innerText = "SYNCING DATA...";
        sysStatusText.style.color = "#fbc02d";
      } 
      else {
        // 4. ONLINE AND UNLOCKED
        banner.className = 'alert-hidden';
        appContainer.classList.remove('app-locked'); // Removes lock!
        updateBadge("LIVE", "var(--danger)", true);
        sysStatusText.innerText = "MATCH SCORING";
        sysStatusText.style.color = "var(--text)";
      }
    }

    // --- FORCE RECONNECT LOGIC ---
    // When browser detects internet returning, forcefully wake up Firebase
    window.addEventListener('online', () => {
        goOnline(db);
        evaluateSystemLock();
    });
    
    // When browser loses internet, put Firebase offline immediately to prevent hang
    window.addEventListener('offline', () => {
        goOffline(db);
        evaluateSystemLock();
    });

    // LISTENER 1: Real-time Connection Status (Firebase Server)
    onValue(connectedRef, (snap) => {
      isConnected = snap.val() === true;
      evaluateSystemLock();
    });

    // LISTENER 2: Real-time Multi-User Sync
    onValue(matchRef, (snapshot) => {
      if (snapshot.exists()) {
        state = snapshot.val();
        if (!state.thisOver) state.thisOver = [];

        // Update inputs only if user isn't currently typing in them
        const safeUpdate = (id, value) => {
          const el = document.getElementById(id);
          if (document.activeElement !== el) el.value = value || "";
        };

        safeUpdate('batTeam', state.batTeam);
        safeUpdate('bowlTeam', state.bowlTeam);
        safeUpdate('statusBar', state.statusBar);
        safeUpdate('maxOvers', state.maxOvers);
        safeUpdate('timerMessage', state.timerMessage);
        safeUpdate('timerTarget', state.timerTarget);
        safeUpdate('brandTitle', state.brandTitle);
        safeUpdate('brandSub', state.brandSub);
        safeUpdate('brandLogo', state.brandLogo);
        safeUpdate('customTitle', state.customTitle);
        safeUpdate('customText', state.customText);
        safeUpdate('customImg', state.customImg);

        document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById('btn-scene-' + (state.activeScene || 'live'));
        if (activeBtn) activeBtn.classList.add('active');

        updateUI();
      } else if (isDataLoaded === false) {
        // First run ever, DB is empty. Push default state.
        set(matchRef, state);
      }
      
      isDataLoaded = true;
      evaluateSystemLock();
    });

    // --- GAME LOGIC ---
    function saveState() { history.push(JSON.parse(JSON.stringify(state))); }
    
    window.undo = () => { 
        if (!navigator.onLine || !isConnected || !isDataLoaded) return;
        if (history.length > 0) { state = history.pop(); syncToFirebase(); } 
    };

    function handleOverReset() { if (state.legalBallsThisOver === 6) { state.thisOver = []; state.legalBallsThisOver = 0; } }

    function canScore() {
      if (!navigator.onLine || !isConnected || !isDataLoaded) return false;
      if (state.innings === 1 && state.wickets >= 10) { alert("All out! Switch innings."); return false; }
      if (state.innings === 1 && state.totalBalls >= state.maxOvers * 6) { alert("Overs completed! Switch innings."); return false; }
      if (state.innings === 2) {
        if (state.runs >= state.target) { alert("Target Reached! Click Auto-Calculate Winner."); return false; }
        if (state.totalBalls >= state.maxOvers * 6) { alert("Overs completed! Click Auto-Calculate Winner."); return false; }
        if (state.wickets >= 10) { alert("All out! Click Auto-Calculate Winner."); return false; }
      }
      return true;
    }

    function autoUpdateStatus() {
      if (state.innings === 2) {
        const runsNeeded = state.target - state.runs;
        const ballsLeft = (state.maxOvers * 6) - state.totalBalls;
        if (runsNeeded <= 0) state.statusBar = `${state.batTeam} won the match!`;
        else if (ballsLeft <= 0 || state.wickets >= 10) state.statusBar = `${state.bowlTeam} won the match!`;
        else state.statusBar = `${state.batTeam} needs ${runsNeeded} runs in ${ballsLeft} balls`;
        document.getElementById('statusBar').value = state.statusBar;
      }
    }

    window.addRun = (runs, label) => {
      if (!canScore()) return; saveState(); handleOverReset();
      state.runs += runs; state.totalBalls += 1; state.legalBallsThisOver += 1; state.thisOver.push(label);
      if (runs === 4) window.triggerEffect('FOUR'); if (runs === 6) window.triggerEffect('SIX');
      autoUpdateStatus(); syncToFirebase();
    };

    window.addWicket = () => {
      if (!canScore()) return; saveState(); handleOverReset();
      state.wickets += 1; state.totalBalls += 1; state.legalBallsThisOver += 1; state.thisOver.push('W');
      window.triggerEffect('OUT'); autoUpdateStatus(); syncToFirebase();
    };

    window.addExtra = (type, defaultRuns) => {
      if (!canScore()) return; saveState(); handleOverReset();
      let runsToAdd = defaultRuns;
      if (type === 'BYE' || type === 'LB') {
        let userRuns = prompt(`Runs for ${type}?`);
        if (userRuns === null) { history.pop(); return; }
        runsToAdd = parseInt(userRuns) || 0; state.totalBalls += 1; state.legalBallsThisOver += 1; state.thisOver.push(`${runsToAdd}${type}`);
      } else {
        let extraRuns = prompt(`Extra runs off bat for ${type}? (Usually 0)`);
        if (extraRuns === null) { history.pop(); return; }
        runsToAdd += (parseInt(extraRuns) || 0); state.thisOver.push(`${runsToAdd}${type}`);
      }
      state.runs += runsToAdd; autoUpdateStatus(); syncToFirebase();
    };

    window.switchInnings = () => {
      if (!navigator.onLine || !isConnected || !isDataLoaded) return;
      if (confirm("End innings and switch teams? UI will automatically swap.")) {
        saveState();
        state.target = state.runs + 1; state.innings = 2; state.runs = 0; state.wickets = 0; state.totalBalls = 0; state.thisOver = []; state.legalBallsThisOver = 0; history = [];

        const batInput = document.getElementById('batTeam');
        const bowlInput = document.getElementById('bowlTeam');
        const tempVal = batInput.value;
        batInput.value = bowlInput.value;
        bowlInput.value = tempVal;

        state.statusBar = `Target for ${batInput.value}: ${state.target} runs from ${state.maxOvers * 6} balls.`;
        document.getElementById('statusBar').value = state.statusBar;
        syncToFirebase();
      }
    };

    window.declareResult = () => {
      if (!navigator.onLine || !isConnected || !isDataLoaded) return;
      if (state.innings === 1) { alert("Match is still in 1st Innings!"); return; }

      let team1 = document.getElementById('bowlTeam').value;
      let team2 = document.getElementById('batTeam').value;
      let t1Score = state.target - 1;
      let t2Score = state.runs;

      if (t2Score >= state.target) {
        state.winText = `${team2} WINS`;
        state.winSubText = `by ${10 - state.wickets} wickets (Defeated ${team1})`;
      } else if (t2Score < t1Score) {
        state.winText = `${team1} WINS`;
        state.winSubText = `by ${t1Score - t2Score} runs (Defeated ${team2})`;
      } else {
        state.winText = "MATCH TIED";
        state.winSubText = `Both teams scored ${t1Score} runs`;
      }

      window.setScene('winner');
    };

    window.resetMatch = () => {
      if (!navigator.onLine || !isConnected || !isDataLoaded) return;
      if (confirm("Reset entirely?")) {
        state.runs = 0; state.wickets = 0; state.totalBalls = 0; state.thisOver = []; state.legalBallsThisOver = 0; state.innings = 1; state.target = 0; history = []; syncToFirebase();
      }
    };

    window.setScene = (scene) => {
      if (!navigator.onLine || !isConnected || !isDataLoaded) return;
      state.activeScene = scene;
      document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('btn-scene-' + scene).classList.add('active');
      syncToFirebase();
    };

    window.triggerEffect = (type) => {
      if (!navigator.onLine || !isConnected || !isDataLoaded) return;
      state.effectType = type; state.effectTimestamp = Date.now(); syncToFirebase();
    };

    function updateUI() {
      document.getElementById('displayScore').innerText = state.runs;
      document.getElementById('displayWickets').innerText = state.wickets;
      document.getElementById('displayOvers').innerText = Math.floor(state.totalBalls / 6) + "." + (state.totalBalls % 6);
      document.getElementById('thisOverUI').innerHTML = state.thisOver.map(b => `<div class="ball">${b}</div>`).join('');
      document.getElementById('matchStatusText').innerText = state.statusBar || "";
    }

    async function syncToFirebase() {
      if (!navigator.onLine || !isConnected || !isDataLoaded) return; // Hard block if offline
      
      state.batTeam = document.getElementById('batTeam').value || "IND";
      state.bowlTeam = document.getElementById('bowlTeam').value || "AUS";
      state.maxOvers = parseInt(document.getElementById('maxOvers').value) || 20;
      state.statusBar = document.getElementById('statusBar').value;
      state.timerMessage = document.getElementById('timerMessage').value;
      state.timerTarget = document.getElementById('timerTarget').value;
      state.brandTitle = document.getElementById('brandTitle').value;
      state.brandSub = document.getElementById('brandSub').value;
      state.brandLogo = document.getElementById('brandLogo').value;
      state.customTitle = document.getElementById('customTitle').value;
      state.customText = document.getElementById('customText').value;
      state.customImg = document.getElementById('customImg').value;

      updateUI();
      await set(matchRef, state);
    }

    // Allow inputs to trigger sync when user types
    document.querySelectorAll('input').forEach(el => el.addEventListener('change', syncToFirebase));
    
    // Initial UI check on page load
    evaluateSystemLock();
  </script>
</body>
</html>
