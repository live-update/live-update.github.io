<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoring Director</title>
  <style>
:root {
    --bg: #ffffff;
    --surface: #f4f6f8;
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #0f5bfa;
    --danger: #dc3545;
    --success: #28a745;
    --border: #e0e0e0;
    --warning: #ff9800;
    --offline: #9e9e9e;
  }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .app-container {
      width: 100%;
      max-width: 500px;
    }
    .panel {
      background: var(--bg);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.01);
      border: 1px solid var(--border);
    }
    .panel-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--surface);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #systemStatusText {
      transition: color 0.5s ease;
      text-transform: capitalize;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: bold;
      color: var(--offline);
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--offline);
      transition: background-color 0.3s;
    }
    .is-blinking {
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-sizing: border-box;
      background: var(--bg);
      font-family: inherit;
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: capitalize;
    }
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 15px 0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }
    button:active {
      transform: scale(0.95);
    }
    button:hover {
      background: var(--bg);
    }
    .btn-4 {
      background: #e3f2fd;
      color: #0d47a1;
      border-color: #bbdefb;
    }
    .btn-6 {
      background: #fde2ff;
      color: #ad00b9;
      border-color: #fab5ff;
    }
    .btn-out {
      background: #ffcdd2;
      color: #b71c1c;
      border-color: #b71c1c;
    }
    .mini-score {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      background: var(--bg);
      padding: 10px;
      border-radius: 8px;
    }
    .status-box {
      font-size: 12px;
      color: var(--accent);
      font-weight: bold;
      text-align: center;
      margin-bottom: 15px;
    }
    .this-over {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
      font-size: 12px;
    }
    .ball {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .input-group {
      display: flex;
      gap: 10px;
    }
    .input-group > div {
      flex: 1;
    }
  </style>
</head>
<body>

  <div class="app-container" id="main-app">
    <div class="panel">
      <div class="panel-title">
        <span id="systemStatusText"></span>
        <div class="live-badge" id="topBadge">
          <div class="dot" id="topBadgeDot"></div>
          <span id="topBadgeText"></span>
        </div>
      </div>

      <div class="input-group">
        <div>
          <label>Batting 🏏</label>
          <input type="text" id="batTeam" placeholder="Batting" value="IND">
        </div>
        <div>
          <label>Bowling ⚾</label>
          <input type="text" id="bowlTeam" placeholder="Bowling" value="AUS">
        </div>
        <div style="flex: 0.5;">
          <label>Overs</label>
          <input type="number" id="maxOvers" value="20">
        </div>
      </div>

      <div class="mini-score">
        <span id="displayScore">0</span>/<span id="displayWickets">0</span> (<span id="displayOvers">0.0</span>)
        <div class="this-over" id="thisOverUI"></div>
      </div>
      <div class="status-box" id="matchStatusText">
        1st Innings
      </div>
      <input type="hidden" id="statusBar"> <div class="keypad">
        <button onclick="addRun(0, '0')">0</button>
        <button onclick="addRun(1, '1')">1</button>
        <button onclick="addRun(2, '2')">2</button>
        <button onclick="addRun(3, '3')">3</button>
        <button class="btn-4" onclick="addRun(4, '4')">4</button>
        <button class="btn-6" onclick="addRun(6, '6')">6</button>
        <button onclick="addExtra('WD', 1)">WD</button>
        <button onclick="addExtra('NB', 1)">NB</button>
        <button onclick="addExtra('BYE', 0)">BYE</button>
        <button onclick="addExtra('LB', 0)">LB</button>
        <button class="btn-out" onclick="addWicket()">OUT</button>
        <button onclick="undo()">Undo</button>
      </div>

      <div style="display: flex; gap: 10px;">
        <button style="flex: 1; background: var(--text); color: white;" onclick="switchInnings()">Switch Innings</button>
        <button style="flex: 0.5;" onclick="resetMatch()">Reset</button>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      onValue,
      goOnline,
      goOffline
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBmXewXcQQt97EJzbKceLbCoTTG_9aJlJI",
      authDomain: "bhaskarjyoticlub.firebaseapp.com",
      databaseURL: "https://bhaskarjyoticlub-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bhaskarjyoticlub",
      storageBucket: "bhaskarjyoticlub.firebasestorage.app",
      messagingSenderId: "730168687443",
      appId: "1:730168687443:web:479bedc258bd9dd06fffa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchRef = ref(db, 'broadcast_state');
    const connectedRef = ref(db, ".info/connected");

    let state = {
      lastUpdated: Date.now(),
      history: [],
      batTeam: "IND",
      bowlTeam: "AUS",
      runs: 0,
      wickets: 0,
      totalBalls: 0,
      maxOvers: 20,
      innings: 1,
      target: 0,
      thisOver: [],
      legalBallsThisOver: 0,
      activeScene: "live",
      statusBar: "Match starting soon...",
      winText: "",
      winSubText: "",
      effectType: "",
      effectTimestamp: 0,
      timerMessage: "MATCH STARTS IN",
      timerTarget: "",
      brandTitle: "",
      brandSub: "",
      brandLogo: "",
      customTitle: "",
      customText: "",
      customImg: ""
    };

    let isConnected = false;
    let needsSync = false;

    function updateBadge(text, color, blink) {
      const badge = document.getElementById('topBadge');
      if (!badge) return;
      document.getElementById('topBadge').style.color = color;
      document.getElementById('topBadgeDot').style.backgroundColor = color;
      document.getElementById('topBadgeText').innerText = text;
      if (blink) badge.classList.add('is-blinking'); else badge.classList.remove('is-blinking');
    }

    function evaluateSystemStatus() {
      const sysStatus = document.getElementById('systemStatusText');
      if (!sysStatus) return;
      if (!navigator.onLine) {
        updateBadge("OFFLINE", "var(--warning)", false);
        sysStatus.innerText = "Saving Offline"; sysStatus.style.color = "var(--warning)";
      } else if (!isConnected) {
        updateBadge("NO DB", "var(--accent)", false);
        sysStatus.innerText = "No Server"; sysStatus.style.color = "var(--accent)";
      } else {
        updateBadge("LIVE", "var(--danger)", true);
        sysStatus.innerText = "Score Board"; sysStatus.style.color = "var(--text)";
        if (needsSync) {
          set(matchRef, state); needsSync = false;
        }
      }
    }

    window.addEventListener('online', () => {
      goOnline(db); evaluateSystemStatus();
    });
    window.addEventListener('offline', () => {
      goOffline(db); evaluateSystemStatus();
    });
    onValue(connectedRef, (snap) => {
      isConnected = snap.val() === true; evaluateSystemStatus();
    });

    // Sync state dynamically if broadcast panel updates
    onValue(matchRef, (snapshot) => {
      if (snapshot.exists()) {
        const dbState = snapshot.val();
        if (dbState.lastUpdated > state.lastUpdated) {
          state = dbState; updateUI();
        }
      }
    });

    function saveState() {
      if (!state.history) state.history = [];
      const stateClone = JSON.parse(JSON.stringify(state));
      delete stateClone.history;
      state.history.push(stateClone);
      if (state.history.length > 40) state.history.shift();
    }

    window.undo = () => {
      if (state.history && state.history.length > 0) {
        const prevState = state.history.pop();
        const currentHistory = state.history;
        state = prevState; state.history = currentHistory; syncToFirebase();
      }
    };

    function handleOverReset() {
      if (state.legalBallsThisOver === 6) {
        state.thisOver = []; state.legalBallsThisOver = 0;
      }
    }

    function canScore() {
      if (state.innings === 1 && state.wickets >= 10) {
        alert("All out! Switch innings."); return false;
      }
      if (state.innings === 1 && state.totalBalls >= state.maxOvers * 6) {
        alert("Overs completed! Switch innings."); return false;
      }
      if (state.innings === 2) {
        if (state.runs >= state.target) {
          alert("Target Reached!"); return false;
        }
        if (state.totalBalls >= state.maxOvers * 6) {
          alert("Overs completed!"); return false;
        }
        if (state.wickets >= 10) {
          alert("All out!"); return false;
        }
      }
      return true;
    }

    function autoUpdateStatus() {
      if (state.innings === 2) {
        const runsNeeded = state.target - state.runs;
        const ballsLeft = (state.maxOvers * 6) - state.totalBalls;
        if (runsNeeded <= 0) state.statusBar = `${state.batTeam} won the match!`;
        else if (ballsLeft <= 0 || state.wickets >= 10) state.statusBar = `${state.bowlTeam} won the match!`;
        else state.statusBar = `${state.batTeam} needs ${runsNeeded} runs in ${ballsLeft} balls`;
        if (document.getElementById('statusBar')) document.getElementById('statusBar').value = state.statusBar;
      }
    }

    window.addRun = (runs, label) => {
      if (!canScore()) return; saveState(); handleOverReset();
      state.runs += runs; state.totalBalls += 1; state.legalBallsThisOver += 1; state.thisOver.push(label);
      if (runs === 4) triggerEffect('FOUR'); if (runs === 6) triggerEffect('SIX');
      autoUpdateStatus(); syncToFirebase();
    };

    window.addWicket = () => {
      if (!canScore()) return; saveState(); handleOverReset();
      state.wickets += 1; state.totalBalls += 1; state.legalBallsThisOver += 1; state.thisOver.push('W');
      triggerEffect('OUT'); autoUpdateStatus(); syncToFirebase();
    };

    window.addExtra = (type, defaultRuns) => {
      if (!canScore()) return; saveState(); handleOverReset();
      let runsToAdd = defaultRuns;
      if (type === 'BYE' || type === 'LB') {
        let userRuns = prompt(`Runs for ${type}?`); if (userRuns === null) return;
        runsToAdd = parseInt(userRuns) || 0; state.totalBalls += 1; state.legalBallsThisOver += 1; state.thisOver.push(`${runsToAdd}${type}`);
      } else {
        let extraRuns = prompt(`Extra runs off bat for ${type}? (Usually 0)`); if (extraRuns === null) return;
        runsToAdd += (parseInt(extraRuns) || 0); state.thisOver.push(`${runsToAdd}${type}`);
      }
      state.runs += runsToAdd; autoUpdateStatus(); syncToFirebase();
    };

    window.switchInnings = () => {
      if (confirm("End innings and switch teams? UI will automatically swap.")) {
        saveState();
        state.target = state.runs + 1; state.innings = 2; state.runs = 0; state.wickets = 0; state.totalBalls = 0; state.thisOver = []; state.legalBallsThisOver = 0;
        const batInput = document.getElementById('batTeam'); const bowlInput = document.getElementById('bowlTeam');
        const tempVal = batInput.value; batInput.value = bowlInput.value; bowlInput.value = tempVal;
        state.statusBar = `Target for ${batInput.value}: ${state.target} runs from ${state.maxOvers * 6} balls.`;
        if (document.getElementById('statusBar')) document.getElementById('statusBar').value = state.statusBar;
        syncToFirebase();
      }
    };

    window.resetMatch = () => {
      if (confirm("Reset entirely?")) {
        state.history = []; state.runs = 0; state.wickets = 0; state.totalBalls = 0; state.thisOver = []; state.legalBallsThisOver = 0; state.innings = 1; state.target = 0; syncToFirebase();
      }
    };

    function triggerEffect(type) {
      state.effectType = type; state.effectTimestamp = Date.now();
    }

    function updateUI() {
      const safeUpdate = (id, value) => {
        const el = document.getElementById(id); if (el && document.activeElement !== el) el.value = value || "";
      };
      safeUpdate('batTeam', state.batTeam); safeUpdate('bowlTeam', state.bowlTeam); safeUpdate('maxOvers', state.maxOvers); safeUpdate('statusBar', state.statusBar);
      if (document.getElementById('displayScore')) document.getElementById('displayScore').innerText = state.runs;
      if (document.getElementById('displayWickets')) document.getElementById('displayWickets').innerText = state.wickets;
      if (document.getElementById('displayOvers')) document.getElementById('displayOvers').innerText = Math.floor(state.totalBalls / 6) + "." + (state.totalBalls % 6);
      if (document.getElementById('thisOverUI')) document.getElementById('thisOverUI').innerHTML = (state.thisOver || []).map(b => `<div class="ball">${b}</div>`).join('');
      if (document.getElementById('matchStatusText')) document.getElementById('matchStatusText').innerText = state.statusBar || "";
    }

    async function syncToFirebase() {
      state.batTeam = document.getElementById('batTeam')?.value || state.batTeam;
      state.bowlTeam = document.getElementById('bowlTeam')?.value || state.bowlTeam;
      state.maxOvers = parseInt(document.getElementById('maxOvers')?.value) || state.maxOvers;
      state.statusBar = document.getElementById('statusBar')?.value || state.statusBar;
      state.lastUpdated = Date.now();

      updateUI();
      localStorage.setItem('admin_match_backup', JSON.stringify(state));
      if (navigator.onLine && isConnected) {
        await set(matchRef, state).catch(e => console.warn("Firebase sync delayed")); needsSync = false;
      } else {
        needsSync = true;
      }
    }

    document.querySelectorAll('input').forEach(el => el.addEventListener('change', syncToFirebase));

    async function initSystem() {
      const localBackup = localStorage.getItem('admin_match_backup');
      if (localBackup) {
        try {
          state = JSON.parse(localBackup); updateUI();
        } catch (e) {}
      }
      get(matchRef).then((snapshot) => {
        if (snapshot.exists()) {
          const firebaseState = snapshot.val();
          if (!state.lastUpdated || (firebaseState.lastUpdated > state.lastUpdated)) {
            state = firebaseState; if (!state.thisOver) state.thisOver = []; if (!state.history) state.history = []; updateUI();
          } else if (state.lastUpdated > firebaseState.lastUpdated) {
            set(matchRef, state);
          }
        } else {
          set(matchRef, state);
        }
        evaluateSystemStatus();
      });
    }
    initSystem();
  </script>
</body>
</html>
