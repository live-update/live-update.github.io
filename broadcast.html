<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broadcast Control</title>
  <style>
:root {
    --bg: #ffffff;
    --surface: #f4f6f8;
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #0f5bfa;
    --danger: #dc3545;
    --success: #28a745;
    --border: #e0e0e0;
    --warning: #ff9800;
    --offline: #9e9e9e;
  }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .app-container {
      width: 100%;
      max-width: 500px;
    }
    .panel {
      background: var(--bg);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.01);
      border: 1px solid var(--border);
    }
    .panel-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--surface);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #systemStatusText {
      transition: color 0.5s ease;
      text-transform: capitalize;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: bold;
      color: var(--offline);
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--offline);
      transition: background-color 0.3s;
    }
    .is-blinking {
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-sizing: border-box;
      background: var(--bg);
      font-family: inherit;
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: capitalize;
    }
    button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 15px 0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }
    button:active {
      transform: scale(0.95);
    }
    button:hover {
      background: var(--bg);
    }
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    .scene-btn {
      font-size: 12px;
      padding: 10px;
    }
    .scene-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #f0f7ff;
    }
    .effect-row {
      display: flex;
      gap: 10px;
    }
    .btn-fx {
      background: #343a40;
      color: white;
      font-size: 12px;
      flex: 1;
      padding: 10px;
    }
    .btn-action {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    .btn-success {
      background: var(--success);
      color: white;
    }
    .input-group {
      display: flex;
      gap: 10px;
    }
    .input-group > div {
      flex: 1;
    }
  </style>
</head>
<body>

  <div class="app-container" id="main-app">
    <div class="panel">
      <div class="panel-title">
        <span id="systemStatusText"></span>
        <div class="live-badge" id="topBadge">
          <div class="dot" id="topBadgeDot"></div>
          <span id="topBadgeText"></span>
        </div>
      </div>

      <label>Active Scene Switcher</label>
      <div class="scene-grid">
        <button class="scene-btn active" id="btn-scene-live" onclick="setScene('live')">1. Live Score</button>
        <button class="scene-btn" id="btn-scene-timer" onclick="setScene('timer')">2. Pre-Match</button>
        <button class="scene-btn" id="btn-scene-decision" onclick="setScene('decision')">3. Umpire</button>
        <button class="scene-btn" id="btn-scene-winner" onclick="setScene('winner')">4. Result</button>
        <button class="scene-btn" id="btn-scene-custom" onclick="setScene('custom')" style="grid-column: span 2">5. Custom Image Graphic</button>
      </div>

      <div style="margin-top:20px">
        <label>Match Status on Live</label>
        <input type="text" id="statusBar" placeholder="e.g., IND won the toss and chose to bat">

        <div style="margin-top: 15px">
          <label>Top-Left Branding</label>
          <div class="input-group">
            <input type="text" id="brandTitle" placeholder="Heading (e.g., T20 CUP)">
            <input type="text" id="brandSub" placeholder="Sub-text (e.g., Match 12)">
          </div>
          <input type="text" id="brandLogo" placeholder="Logo Image URL (Optional)">
        </div>

        <div style="margin-top: 15px;">
          <label>Custom Graphic (Scene 5)</label>
          <input type="text" id="customImg" placeholder="Image URL (e.g., Sponsor/Player Banner)">
          <input type="text" id="customTitle" placeholder="Main Heading (e.g., PLAYER OF THE MATCH)">
          <input type="text" id="customText" placeholder="Sub-text or Stats description">
        </div>

        <div style="margin-top:15px">
          <label>Timer Settings (Scene 2)</label>
          <input type="text" id="timerMessage" placeholder="Starting in" value="Starting in">
          <input type="datetime-local" id="timerTarget">
        </div>

        <button class="btn-action btn-success" style="background: var(--success);" onclick="declareResult()">Show Result</button>

        <div style="margin-top:20px">
          <label>Screen Effects on Live</label>
          <div class="effect-row">
            <button class="btn-fx" style="background: #0d47a1" onclick="triggerEffect('FOUR')">Four</button>
            <button class="btn-fx" style="background: #ad00b9" onclick="triggerEffect('SIX')">Six</button>
            <button class="btn-fx" style="background: var(--danger);" onclick="triggerEffect('OUT')">Out</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      onValue,
      goOnline,
      goOffline
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBmXewXcQQt97EJzbKceLbCoTTG_9aJlJI",
      authDomain: "bhaskarjyoticlub.firebaseapp.com",
      databaseURL: "https://bhaskarjyoticlub-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bhaskarjyoticlub",
      storageBucket: "bhaskarjyoticlub.firebasestorage.app",
      messagingSenderId: "730168687443",
      appId: "1:730168687443:web:479bedc258bd9dd06fffa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchRef = ref(db, 'broadcast_state');
    const connectedRef = ref(db, ".info/connected");

    let state = {
      lastUpdated: Date.now(),
      history: [],
      batTeam: "IND",
      bowlTeam: "AUS",
      runs: 0,
      wickets: 0,
      totalBalls: 0,
      maxOvers: 20,
      innings: 1,
      target: 0,
      thisOver: [],
      legalBallsThisOver: 0,
      activeScene: "live",
      statusBar: "Match starting soon...",
      winText: "",
      winSubText: "",
      effectType: "",
      effectTimestamp: 0,
      timerMessage: "MATCH STARTS IN",
      timerTarget: "",
      brandTitle: "",
      brandSub: "",
      brandLogo: "",
      customTitle: "",
      customText: "",
      customImg: ""
    };

    let isConnected = false;
    let needsSync = false;

    function updateBadge(text, color, blink) {
      const badge = document.getElementById('topBadge');
      if (!badge) return;
      document.getElementById('topBadge').style.color = color;
      document.getElementById('topBadgeDot').style.backgroundColor = color;
      document.getElementById('topBadgeText').innerText = text;
      if (blink) badge.classList.add('is-blinking'); else badge.classList.remove('is-blinking');
    }

    function evaluateSystemStatus() {
      const sysStatus = document.getElementById('systemStatusText');
      if (!sysStatus) return;
      if (!navigator.onLine) {
        updateBadge("OFFLINE", "var(--warning)", false);
        sysStatus.innerText = "Saving Offline"; sysStatus.style.color = "var(--warning)";
      } else if (!isConnected) {
        updateBadge("NO DB", "var(--accent)", false);
        sysStatus.innerText = "No Server"; sysStatus.style.color = "var(--accent)";
      } else {
        updateBadge("LIVE", "var(--danger)", true);
        sysStatus.innerText = "Broadcast Board"; sysStatus.style.color = "var(--text)";
        if (needsSync) {
          set(matchRef, state); needsSync = false;
        }
      }
    }

    window.addEventListener('online', () => {
      goOnline(db); evaluateSystemStatus();
    });
    window.addEventListener('offline', () => {
      goOffline(db); evaluateSystemStatus();
    });
    onValue(connectedRef, (snap) => {
      isConnected = snap.val() === true; evaluateSystemStatus();
    });

    // Sync state dynamically if scoring panel updates
    onValue(matchRef, (snapshot) => {
      if (snapshot.exists()) {
        const dbState = snapshot.val();
        if (dbState.lastUpdated > state.lastUpdated) {
          state = dbState; updateUI();
        }
      }
    });

    window.setScene = (scene) => {
      state.activeScene = scene;
      document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
      const btn = document.getElementById('btn-scene-' + scene);
      if (btn) btn.classList.add('active');
      syncToFirebase();
    };

    window.triggerEffect = (type) => {
      state.effectType = type; state.effectTimestamp = Date.now(); syncToFirebase();
    };

    window.declareResult = () => {
      if (state.innings === 1) {
        alert("Match is still in 1st Innings!"); return;
      }
      let team1 = state.bowlTeam;
      let team2 = state.batTeam;
      let t1Score = state.target - 1;
      let t2Score = state.runs;

      if (t2Score >= state.target) {
        state.winText = `${team2} WINS`; state.winSubText = `by ${10 - state.wickets} wickets (Defeated ${team1})`;
      } else if (t2Score < t1Score) {
        state.winText = `${team1} WINS`; state.winSubText = `by ${t1Score - t2Score} runs (Defeated ${team2})`;
      } else {
        state.winText = "MATCH TIED"; state.winSubText = `Both teams scored ${t1Score} runs`;
      }
      window.setScene('winner');
    };

    function updateUI() {
      const safeUpdate = (id, value) => {
        const el = document.getElementById(id); if (el && document.activeElement !== el) el.value = value || "";
      };
      safeUpdate('statusBar', state.statusBar); safeUpdate('timerMessage', state.timerMessage); safeUpdate('timerTarget', state.timerTarget);
      safeUpdate('brandTitle', state.brandTitle); safeUpdate('brandSub', state.brandSub); safeUpdate('brandLogo', state.brandLogo);
      safeUpdate('customTitle', state.customTitle); safeUpdate('customText', state.customText); safeUpdate('customImg', state.customImg);

      document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('btn-scene-' + (state.activeScene || 'live'));
      if (activeBtn) activeBtn.classList.add('active');
    }

    async function syncToFirebase() {
      state.statusBar = document.getElementById('statusBar')?.value || state.statusBar;
      state.timerMessage = document.getElementById('timerMessage')?.value || state.timerMessage;
      state.timerTarget = document.getElementById('timerTarget')?.value || state.timerTarget;
      state.brandTitle = document.getElementById('brandTitle')?.value || state.brandTitle;
      state.brandSub = document.getElementById('brandSub')?.value || state.brandSub;
      state.brandLogo = document.getElementById('brandLogo')?.value || state.brandLogo;
      state.customTitle = document.getElementById('customTitle')?.value || state.customTitle;
      state.customText = document.getElementById('customText')?.value || state.customText;
      state.customImg = document.getElementById('customImg')?.value || state.customImg;
      state.lastUpdated = Date.now();

      updateUI();
      localStorage.setItem('admin_broadcast_backup', JSON.stringify(state));
      if (navigator.onLine && isConnected) {
        await set(matchRef, state).catch(e => console.warn("Firebase sync delayed")); needsSync = false;
      } else {
        needsSync = true;
      }
    }

    document.querySelectorAll('input').forEach(el => el.addEventListener('change', syncToFirebase));

    async function initSystem() {
      const localBackup = localStorage.getItem('admin_broadcast_backup');
      if (localBackup) {
        try {
          state = JSON.parse(localBackup); updateUI();
        } catch (e) {}
      }
      get(matchRef).then((snapshot) => {
        if (snapshot.exists()) {
          const firebaseState = snapshot.val();
          if (!state.lastUpdated || (firebaseState.lastUpdated > state.lastUpdated)) {
            state = firebaseState; if (!state.thisOver) state.thisOver = []; if (!state.history) state.history = []; updateUI();
          } else if (state.lastUpdated > firebaseState.lastUpdated) {
            set(matchRef, state);
          }
        } else {
          set(matchRef, state);
        }
        evaluateSystemStatus();
      });
    }
    initSystem();
  </script>
</body>
</html>
